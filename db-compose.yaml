services:
  psql:
    image: postgres:18.4-alpine
    container_name: psql-18.4-alpine
    env_file:
      - .env
    volumes:
      - "pg_data:/var/lib/postgresql/18/docker"
    ports:
      - "${PG_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  pg_data:
